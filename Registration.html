<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h2>Registration Form</h2>
        <form action="./login.html">
            <div>
            <label>Email*</label>
            <input type="email" required>
            </div><br>
            <div>
            <label>Mobile*</label>
            <input type="number" placeholder="Please enter 10 digit number" required>
            </div><br>
            <div>
            <label>Username*</label>
            <input type="text" required minlength="5" maxlength="9">
            </div><br>
            <div>
            <label>Password*</label>
            <input type="password" required minlength="6" maxlength="10">
            </div><br>
            <div>
            <label>Country</label>
            <input type="text" value="India" disabled>
            </div><br><br>

            <input type="submit" value="Register">
            <input type="reset" value="Cancel">
            
        </form>
    </body>
</html>
